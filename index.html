<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/logo.png"
    />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- SEO -->
    <title>AIAERA</title>

    <meta
      name="description"
      content="Create and deploy AI chatbots for your business in minutes."
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="AIAERA"
    />

    <meta
      property="og:description"
      content="Create and deploy AI chatbots for your business in minutes."
    />

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:image"
      content="/og-image.png"
    />

    <!-- Theme Color -->
    <meta
      name="theme-color"
      content="#0f0b1a"
    />

    <!-- Performance -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- Base Styles -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
        background: radial-gradient(
          circle at top,
          #1a1625,
          #0f0b1a
        );
        color: white;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }

      /* Selection */
      ::selection {
        background: #7f5af0;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- React App -->
    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
